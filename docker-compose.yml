version: "3.9"

services:
  api:
    build: .
    image: phoenix-app
    container_name: phoenix-api
    ports:
      - "8080:5000"
    environment:
      - DATABASE_URI=mongodb://database:27017/phoenix
      - PORT=5000
    depends_on:
      - database
    volumes:
      - ./logs:/app/logs

  database:
    image: mongo:latest
    container_name: phoenix-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
